<script type="text/javascript">
	var messageArr = ["학생","교육여건"
					 ,"교육연구성과","대학재정/교육비"
					 ,"대학운영","전체목록"
					 ];
	var itemIdxArr = ["01","04","02","03","05","all"];
	var arrNum	   = 0;

	$(document).ready(function() {
		fn_search();
	});
	
	function fn_search(){
		if(arrNum < messageArr.length-1){
			var message = messageArr[arrNum];
			var itemDivCd = itemIdxArr[arrNum];
			$("#itemDivCd").val(itemDivCd);
			gfn_Submission_Call("/popup/main0810/selectDataList.do", $("#frm").serialize(), function(data){
				if(data != null){
					// 공통 에러 메시지 처리
					if( data.M_CODE < 0 ){
						alert(data.M_RTME);
					}else{
						html=fn_makeResult(message,data);
						$("#tbResult").append(html);
						// 콤보박스 호출 후 체크
						uiFront.setUISelect();
						arrNum=1+arrNum;
						fn_search();
					}
				}
			},'json');
		}
	}
	
	function fn_makeComboResult(eraList,kndList,resultList){
		var rtnHtml ="";
		for(var i=0; i<eraList.length; i++){
			var eraObj=eraList[i];
			if( eraObj.item_id == resultList.item_id && resultList.pgm_clft_cd == "P" ){	
				rtnHtml +='\n <span class="ui-select-wrap text-list-height">';
				rtnHtml +='\n <select class="ui-select" data-width="130" id="'+resultList.item_id+'" name="all" >';
				for(var j=0;j<kndList.length;j++) {
					var kndObj=kndList[j];
					if(kndObj.item_id == resultList.item_id) {
						rtnHtml +='\n <option value="'+resultList.item_id+'^^'+kndObj.acif_dta_rqst_knd_cd+'">';
						if(kndObj.acif_dta_rqst_knd_cd == '10') {
							rtnHtml +='학교별';
						} else {
							rtnHtml +='학과별';
						}
						rtnHtml +='</option>';
					}
				} //for end
				rtnHtml +='\n </select></span>';
				return rtnHtml;
			}
		} //for end

		return "";
	}
	
	function fn_makeChkResult(eraList,resultList){
		var rtnHtml ="";
		rtnHtml +='\n <ul class="radio-check-list">';
		
		for(var i=0; i<eraList.length; i++){
			var eraObj =eraList[i];
			if( eraObj.item_id == resultList.item_id && resultList.pgm_clft_cd == "P" ){
				//
				var btnName= resultList.pdf_use_yn == 'Y' ? "PDF":"";
				rtnHtml +='\n <li><span class="radio-check-wrap">';
				rtnHtml +='\n <input id="'+resultList.item_id+'^^'+eraObj.svy_yr+'" name="all" value="'+resultList.item_id+'^^'+eraObj.svy_yr+'" type="checkbox">';
				rtnHtml +='\n <label for="'+resultList.item_id+'^^'+eraObj.svy_yr+'">'+eraObj.svy_yr+'년</label>';
				rtnHtml +='\n </span></li>';
			}
		} //for end
		
		rtnHtml +='\n </ul>';		
		return rtnHtml;
	}	
	
	function fn_makeResult(message,data){
		var html	= "";
		var detailItemList2 = data.ajaxList2;
		var detailItemList3 = data.ajaxList3;
		var detailItemList4 = data.ajaxList4;	
		var eraList			= data.ajaxList5;
		var kndList			= data.ajaxList6;
		var divYN			= true;

		html+='\n <h3 class="group-title">'+message+'</h3>';
		html+='\n <ol class="text-list">  ';
		for(var i=0; i<detailItemList2.length; i++){	
			var resultList2	 = detailItemList2[i];
			var count 		 = 0;
			html+='\n <li>';

			html+='\n <span class="text-list-title">'+resultList2.pgm_estn_nm +'</span>';
			html+= fn_makeComboResult(eraList,kndList,resultList2);	
			html+= fn_makeChkResult(eraList,resultList2);				
			
			for(var j=0; j<detailItemList3.length; j++){
	
					var resultList3	= detailItemList3[j];
					var pgm_estn_nm;
					
					if( resultList3.pgm_estn_nm == null ){
						pgm_estn_nm = ["",""];
					}else{
						pgm_estn_nm= resultList3.pgm_estn_nm.split(".")
					}
					
					if (resultList2.pgm_id == resultList3.uppr_pgm_id){
						if(count==0){
							html+='\n <ul class="depth-2">';
						}
						var className3 = 'depth-text';
						count	= count+1;														
						html+='\n <li>';
						html+='\n <span class="'+className3+'">'+pgm_estn_nm[1]+'</span>';
						html+= fn_makeComboResult(eraList,kndList,resultList3);
						html+= fn_makeChkResult(eraList,resultList3);						
	
						var count2 =0;			
						for(var k=0; k<detailItemList4.length; k++){
							var resultList4	= detailItemList4[k];
							var pgm_estn_nm2;
							
							if( resultList4.pgm_estn_nm == null ){
								pgm_estn_nm2 = ["",""];
							}else{
								pgm_estn_nm2= resultList4.pgm_estn_nm.split(".")
							}							
							
							if(resultList3.pgm_id == resultList4.uppr_pgm_id){
								if( count2==0){
									html+='\n <ul class="depth-3">';
								}	
								count2=count2 + 1;
								var className4 = 'depth-text';
								html+='\n <li>';
								html+='\n <span class="'+className4+'">'+pgm_estn_nm2[1]+'</span>';
								html+= fn_makeComboResult(eraList,kndList,resultList4);
								html+= fn_makeChkResult(eraList,resultList4);								
								html+='\n </li>';								
																			
							}
							if((count2>0) && ( (k+1)== detailItemList4.length ) ) {
								html+='\n </ul>';
							}
						}// for k end
						html+='\n </li>';
					}
					
				if((count>0) && ( (j+1)== detailItemList3.length ) ){
					html+='\n </ul>';
				}	
			} // j end
			html+='\n </li>';	
		}// i end 	
		html+='</ol>';
		
		return html;
	}
	
	$(function() {
		var svyYr="";
		
		$("#dnlZip1,#dnlZip2").each(function(){
			$(this).click(function(){
				var chk="";
				$('input[name=all]:checked').each(function(){
					chk=$(this).val();

				});
				if(!chk) {				
					alert("요청항목이 하나 이상 있어야 합니다.");
					return false;
				}
				
				$('#schlDivCds').val("02");
				gfn_Submission_Call("/popup/main0810/selectReqList.do", $("#frm").serialize(), function(data){
					if(data != null){
						// 공통 에러 메시지 처리
						if( data.M_CODE < 0 ){
							alert(data.M_RTME);
						}else{
							var fl = data.resultList1;
							
							if(fl.length > 10) {
								alert("파일은 10개까지만 선택할 수 있습니다.");
								return false;
							}
							
							if(fl != "") {
								for(var i=0; i<fl.length;i++) {	
									if(fl[i].colvalue12 != null && fl[i].colvalue12 != "") {
										if(fl[i].colvalue13 != null && fl[i].colvalue13 != "") {
											fn_dashMap(fl[i].colvalue2,"sel",fl[i].colvalue2+"^^"+fl[i].colvalue12+"^^"+fl[i].colvalue13);
										} 
									}	
								}
							}

							//
							gfn_Submission_Call("/popup/main0810/selectReqRst.do", $("#frm").serialize(), function(data){
								if(data != null){
									// 공통 에러 메시지 처리
									if( data.M_CODE < 0 ){
										alert(data.M_RTME);
									}else{
										if(parseInt(data.resultList.exist)) {
											$('#fp').val(data.resultList.fp);
											$('#fn').val(data.resultList.fn);
											$('#sn').val(data.resultList.sn);
											
								 	       	$("#frm").attr("method","post");
								 	       	$("#frm").attr("action","/popup/main0810/download.do");
								 	       	$("#frm").attr("onsubmit","true");
								 	       	$("#frm").submit();
										} else {
											alert("파일이 존재하지 않습니다.");
										}
										
									}
								}
							},'json');	
							//
							if(fl != "") {
								for(var i=0; i<fl.length;i++) {
									if(fl[i].colvalue12 != null && fl[i].colvalue12 != "") {
										if(fl[i].colvalue13 != null && fl[i].colvalue13 != "") {
											fn_dashUnMap(fl[i].colvalue2,"sel",fl[i].colvalue2+"^^"+fl[i].colvalue12+"^^"+fl[i].colvalue13);
										}
									}	
								}
							}							
							//
						}
					}
				},'json');
			});
		});		
		
		$('#movePage').click(function(){
			var schlDivCd = "02";
			var svyYr = "";
			var url	   = "/popup/main0820/list.do?schlDivCd="+schlDivCd+"&svyYr="+svyYr+"";
	 		window.location.href=url;	 		
		});
		
		$('#comboSelRst').selectmenu({
			change: function(event, ui) {
	 			$("#schlDivCd").val($('#comboSelRst').val());
	 			var schlDivCd = $("#schlDivCd").val();
	 			
	 	       	$("#frm").attr("method","get");
	 	       	$("#frm").attr("action","/popup/main0810/list.do");
	 	       	$("#frm").attr("onsubmit","true");
	 	       	$("#frm").submit();		 			
			}
		});	
	
	});
	
</script>

<div id="tbResult"></div>
